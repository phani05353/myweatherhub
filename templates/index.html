<!--
Project Context: MyWeatherHub
        - Frontend: HTML5, Bootstrap 5 (modal only), Chart.js, Weather Icons (wi)
        - Backend: Python/Flask (/weather_data endpoint)
        - APIs: NWS, Open-Meteo (Air Quality, Geocoding, Archive, Forecast)
        - UI direction: "Ember · dark & glassy" (design direction #3) — reproduced
          section-for-section: status bar, location header, city chips, hero with
          spinning ray-ring, pink-glass alert, Hourly / Precipitation / Sun /
          AQI+UV / Live Radar / 7-Day glass cards, home indicator. Single centered
          phone-style column on a full-bleed ember canvas.
-->
<!DOCTYPE html>
<html lang="en" data-bs-theme="dark" id="main-html">

<head>
    <meta charset="UTF-8">
    <link rel="manifest" href="/manifest.json">
    <link rel="preconnect" href="https://api.open-meteo.com">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet" media="print" onload="this.media='all'">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link id="favicon" rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌤️</text></svg>">
    <meta name="theme-color" id="meta-theme" content="#241019">
    <title>Weather Hub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" media="print" onload="this.media='all'">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/weather-icons/2.0.12/css/weather-icons.min.css" media="print" onload="this.media='all'">
    <script src="https://cdn.jsdelivr.net/npm/chart.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <style>
        /* ── EMBER · dark & glassy (design direction #3) ── */
        :root {
            --bg-color: #0c0508;
            --card-bg: #241019;
            --glass: rgba(255, 255, 255, 0.06);
            --glass-brd: rgba(255, 255, 255, 0.10);
            --accent: #FF8A5C;
            --accent2: #FF5E7E;
            --accent-amber: #FFB05C;
            --text: #FFF1E9;
            --muted: #C99AA6;
            --muted2: #D8AEB8;
            --dynamic-blur: 4px;
        }

        [data-bs-theme="light"] {
            --bg-color: #FFF4EA;
            --card-bg: #FFF4EA;
            --glass: rgba(255, 255, 255, 0.62);
            --glass-brd: rgba(122, 58, 26, 0.14);
            --accent: #E0682E;
            --accent2: #d9542f;
            --accent-amber: #d9802f;
            --text: #3a2317;
            --muted: #9c6646;
            --muted2: #7a5340;
        }

        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        html { scroll-behavior: smooth; }

        body {
            background-color: var(--bg-color) !important;
            color: var(--text);
            font-family: "Sora", -apple-system, system-ui, "Segoe UI", Roboto, sans-serif;
            padding: 0;
            margin: 0;
            overflow-x: hidden;
        }

        @keyframes wh-spin { to { transform: rotate(360deg); } }
        @keyframes wh-floaty { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
        @keyframes wh-pulse { 0%,100% { opacity: .5; } 50% { opacity: 1; } }
        @keyframes rotateSun { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        #loader {
            position: fixed;
            inset: 0;
            background: radial-gradient(120% 70% at 70% 0%, #5a1d33 0%, #3a1226 40%, #241019 75%);
            z-index: 2000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #FFF1E9;
            transition: opacity 0.5s ease;
        }
        .weather-animation { position: relative; width: 80px; height: 80px; margin-bottom: 20px; }
        .cloud-icon { font-size: 60px; color: #fff; animation: float 3s ease-in-out infinite; position: absolute; z-index: 2; }
        .sun-behind { font-size: 40px; color: #FFB05C; position: absolute; top: -10px; right: 5px; animation: rotateSun 10s linear infinite; z-index: 1; }
        @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        /* ── Full-bleed ember canvas behind the centered column ── */
        #dynamic-bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            background: radial-gradient(120% 70% at 70% 0%, #5a1d33 0%, #3a1226 40%, #241019 75%);
            transition: background 1.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        #dynamic-bg::before {
            content: "";
            position: absolute;
            left: -40px;
            top: 60px;
            width: 240px;
            height: 240px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255, 94, 126, 0.35), transparent 70%);
            filter: blur(24px);
            pointer-events: none;
        }
        #dynamic-bg::after {
            content: "";
            position: absolute;
            inset: 0;
            background:
                radial-gradient(220px 220px at 86% 2%, rgba(255, 176, 92, 0.38), transparent 70%),
                radial-gradient(120% 70% at 50% -8%, rgba(255, 255, 255, 0.06), transparent 55%),
                linear-gradient(180deg, transparent 55%, rgba(0, 0, 0, 0.28) 100%);
            pointer-events: none;
        }
        #weather-overlay { position: fixed; inset: 0; z-index: 1; pointer-events: none; overflow: hidden; }
        .celestial { position: fixed; z-index: 1; border-radius: 50%; pointer-events: none; transition: all 1.4s cubic-bezier(0.4, 0, 0.2, 1); opacity: 0; }
        .celestial.sun {
            width: 120px; height: 120px; top: 7vh; right: 8vw; opacity: 1;
            background: radial-gradient(circle, #FFE9C8 0%, #FFB05C 58%, rgba(255, 176, 92, 0) 72%);
            box-shadow: 0 0 90px 26px rgba(255, 140, 92, 0.40);
        }
        .celestial.moon {
            width: 76px; height: 76px; top: 7vh; right: 9vw; opacity: 1;
            background: radial-gradient(circle at 38% 38%, #fdf0f3 0%, #e2c7cf 70%, #c99aa6 100%);
            box-shadow: 0 0 46px 8px rgba(201, 154, 166, 0.40);
        }

        /* ── The centered phone-style column ── */
        .main-card {
            position: relative;
            z-index: 5;
            max-width: 440px;
            margin: 0 auto;
            min-height: 100vh;
            padding: 0 16px 24px;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            will-change: transform;
        }

        #pull-indicator {
            position: absolute; top: -50px; left: 50%; transform: translateX(-50%);
            color: var(--accent); font-size: 1.5rem; opacity: 0; transition: opacity 0.2s; z-index: 100;
        }

        /* ── Header (location + controls) ── */
        .wx-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 22px 4px 0; gap: 10px;
        }
        .wx-loc { display: flex; align-items: center; gap: 7px; min-width: 0; }
        .wx-loc svg { flex: 0 0 auto; }
        #loc-name {
            font-size: 21px; font-weight: 700; color: var(--text); margin: 0;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis; text-transform: none; letter-spacing: 0;
        }

        .controls { display: flex; align-items: center; gap: 8px; flex: 0 0 auto; }
        .unit-pill {
            position: relative; display: flex; background: var(--glass);
            backdrop-filter: blur(12px); padding: 3px; border-radius: 50px;
            border: 1px solid var(--glass-brd); width: 78px; height: 34px;
        }
        .unit-pill input { display: none; }
        .unit-pill label { flex: 1; z-index: 2; text-align: center; line-height: 28px; font-size: 0.75rem; font-weight: 700; cursor: pointer; color: var(--muted); }
        .unit-pill input:checked + label { color: #fff; }
        .pill-bg { position: absolute; top: 3px; left: 3px; width: 36px; height: 28px; background: linear-gradient(120deg, #FF5E7E, #FF8A5C); border-radius: 50px; transition: transform 0.3s; z-index: 1; }
        #c-unit:checked ~ .pill-bg { transform: translateX(36px); }
        .btn-circle {
            width: 34px; height: 34px; border-radius: 50%; border: 1px solid var(--glass-brd);
            background: var(--glass); backdrop-filter: blur(12px); color: var(--text);
            display: flex; align-items: center; justify-content: center; cursor: pointer;
        }

        /* ── Hero ── */
        .wx-hero { display: flex; flex-direction: column; align-items: center; padding: 14px 16px 6px; text-align: center; }
        .wx-hero-art { position: relative; width: 124px; height: 124px; display: flex; align-items: center; justify-content: center; animation: wh-floaty 6s ease-in-out infinite; }
        .wx-rays {
            position: absolute; inset: 0; margin: auto; width: 124px; height: 124px; border-radius: 50%;
            background: repeating-conic-gradient(from 0deg, #FFB05C 0deg 2.4deg, transparent 2.4deg 30deg);
            -webkit-mask: radial-gradient(circle, transparent 32px, #000 33px, #000 48px, transparent 49px);
            mask: radial-gradient(circle, transparent 32px, #000 33px, #000 48px, transparent 49px);
            animation: wh-spin 34s linear infinite; opacity: .8;
        }
        #main-icon { position: relative; z-index: 2; font-size: 3.3rem; color: var(--accent-amber); filter: drop-shadow(0 0 26px rgba(255, 140, 92, 0.55)); }
        .temp-display {
            font-weight: 800; font-size: clamp(5.5rem, 26vw, 7rem); line-height: 0.9; letter-spacing: -4px; margin: 6px 0 0;
            background: linear-gradient(120deg, #FFE0A8, #FF8A9E);
            -webkit-background-clip: text; background-clip: text; color: transparent !important;
            filter: drop-shadow(0 3px 24px rgba(0, 0, 0, 0.30));
        }
        .wx-forecast { font-size: 19px; font-weight: 700; color: var(--text); margin-top: 2px; }
        .wx-hl { display: flex; gap: 14px; margin-top: 6px; font-size: 14px; font-weight: 600; color: var(--muted2); }
        .wx-hindsight { margin-top: 8px; font-size: 12px; font-weight: 500; color: var(--muted); background: var(--glass); border: 1px solid var(--glass-brd); padding: 4px 12px; border-radius: 50px; }
        .wx-clothing { margin-top: 8px; font-size: 13px; font-weight: 600; color: var(--accent-amber); }

        /* ── Content column ── */
        .wx-content { display: flex; flex-direction: column; gap: 14px; padding: 14px 4px 0; }

        .wx-card { background: var(--glass); border: 1px solid var(--glass-brd); border-radius: 24px; padding: 18px; backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); }
        .wx-label { font-size: 12px; font-weight: 600; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); }
        .wx-sub { font-size: 12px; font-weight: 500; color: var(--muted); }
        .wx-strong { font-size: 15px; font-weight: 700; color: var(--text); }
        .wx-card-head { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 14px; }

        /* ── Alert (pink glass) ── */
        .wx-alert {
            display: flex; align-items: center; gap: 12px; padding: 14px 16px; border-radius: 20px; cursor: pointer;
            background: rgba(255, 94, 126, 0.14); border: 1px solid rgba(255, 94, 126, 0.35);
            box-shadow: 0 0 24px -8px rgba(255, 94, 126, 0.5);
        }
        .wx-alert.extreme { background: rgba(255, 71, 87, 0.18); border-color: rgba(255, 71, 87, 0.5); }
        .wx-alert .ic { animation: wh-pulse 2.2s ease-in-out infinite; flex: 0 0 auto; }
        .wx-alert .ttl { font-weight: 600; font-size: 13.5px; color: #FFC2CE; }
        .wx-alert .dsc { font-size: 12px; color: var(--muted); font-weight: 400; margin-top: 1px; }

        /* ── Hourly ── */
        .wx-hourly { display: flex; gap: 6px; overflow-x: auto; scrollbar-width: none; margin-top: 12px; }
        .wx-hourly::-webkit-scrollbar { display: none; }
        .wx-hour { flex: 0 0 auto; display: flex; flex-direction: column; align-items: center; gap: 8px; padding: 8px 12px; border-radius: 18px; min-width: 54px; transition: transform .2s; }
        .wx-hour:hover { transform: translateY(-3px); }
        .wx-hour .wx-hour-t { font-size: 12px; font-weight: 600; color: var(--muted); }
        .wx-hour .wx-hour-i { font-size: 1.25rem; color: var(--accent-amber); }
        .wx-hour .wx-hour-tmp { font-size: 15px; font-weight: 700; color: var(--text); }
        .wx-hour .wx-hour-p { font-size: 10px; font-weight: 700; color: #7ec0ef; min-height: 12px; }
        .wx-hour.now { background: linear-gradient(165deg, #FF5E7E, #FF8A5C); box-shadow: 0 8px 20px -8px rgba(255, 94, 126, 0.6); }
        .wx-hour.now .wx-hour-t, .wx-hour.now .wx-hour-tmp { color: #fff; }
        .wx-hour.now .wx-hour-i { color: #fff; }
        .wx-hour.sun { background: rgba(255, 176, 92, 0.14); border: 1px solid rgba(255, 176, 92, 0.3); }
        .wx-hour.sun .wx-hour-t { color: var(--accent-amber); }
        .wx-hour.sun .wx-hour-i { color: var(--accent-amber); animation: rotateSun 20s linear infinite; }

        /* ── Precipitation bars ── */
        .wx-precip { display: flex; align-items: flex-end; gap: 5px; height: 60px; }
        .wx-pbar { flex: 1; border-radius: 4px; min-height: 4px; transition: height .5s ease; }
        .wx-precip-cap { font-size: 12.5px; font-weight: 500; color: #7ec0ef; margin-top: 12px; }

        /* ── Sun arc ── */
        .wx-sun-times { display: flex; justify-content: space-between; margin-top: 2px; }

        /* ── AQI + UV pair ── */
        .wx-pair { display: flex; gap: 14px; }
        .wx-pair > .wx-card { flex: 1; min-width: 0; }
        .wx-big { font-size: 38px; font-weight: 800; color: var(--text); margin-top: 8px; line-height: 1; }
        .wx-cat { display: inline-block; margin-top: 8px; padding: 3px 10px; border-radius: 12px; font-size: 11.5px; font-weight: 700; }
        .wx-bar { position: relative; height: 6px; border-radius: 3px; margin-top: 12px; }
        .wx-bar-dot { position: absolute; top: -3px; width: 12px; height: 12px; border-radius: 50%; background: #fff; box-shadow: 0 0 8px rgba(255, 255, 255, 0.6); transform: translateX(-50%); }

        /* ── Stats grid (wind / humidity / visibility / road / score) ── */
        .wx-stats { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        .wx-stat { background: var(--glass); border: 1px solid var(--glass-brd); border-radius: 18px; padding: 14px; transition: transform .2s; }
        .wx-stat.interactive { cursor: pointer; }
        .wx-stat.interactive:hover { transform: translateY(-2px); }
        .wx-stat .wx-strong { margin-top: 6px; display: flex; align-items: center; gap: 6px; }

        /* ── Live Radar ── */
        .wx-radar-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .wx-live { display: flex; align-items: center; gap: 6px; font-size: 11px; font-weight: 700; color: var(--accent2); }
        .wx-live .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent2); box-shadow: 0 0 8px var(--accent2); animation: wh-pulse 1.6s infinite; }
        #radar-container iframe { width: 100%; border: none; border-radius: 16px; display: block; }

        /* ── 7-Day ── */
        .wx-day-row { display: flex; align-items: center; gap: 12px; padding: 9px 0; }
        .wx-day-row + .wx-day-row { border-top: 1px solid var(--glass-brd); }
        .wx-day-row.clickable { cursor: pointer; }
        .wx-day-lbl { width: 44px; font-size: 14px; font-weight: 600; color: var(--text); }
        .wx-day-ico { width: 24px; text-align: center; color: var(--accent-amber); }
        .wx-day-lo { width: 34px; text-align: right; font-size: 13px; color: var(--muted); }
        .wx-day-bar { flex: 1; height: 5px; border-radius: 3px; background: var(--glass-brd); position: relative; }
        .wx-day-fill { position: absolute; height: 100%; border-radius: 3px; background: linear-gradient(90deg, #7ec0ef, #FFB05C); }
        .wx-day-hi { width: 34px; font-size: 14px; font-weight: 700; color: var(--text); }

        /* ── Home indicator + footer ── */
        .wx-home { display: flex; justify-content: center; padding: 18px 0 4px; }
        .wx-home > div { width: 132px; height: 5px; border-radius: 3px; background: rgba(255, 241, 233, 0.3); }
        .powered-by-footer { padding: 18px 15px 4px; text-align: center; opacity: 0.85; font-size: 0.8rem; color: var(--accent-amber); text-shadow: 0 0 8px rgba(255, 176, 92, 0.25); }

        /* ── Search ── */
        .search-wrapper {
            position: relative; display: flex; align-items: center; background: var(--glass);
            backdrop-filter: blur(15px); border-radius: 50px; border: 1px solid var(--glass-brd);
            height: 34px; width: 34px; transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1); z-index: 1100; overflow: visible;
        }
        .search-wrapper.active { width: 180px; }
        #search-input { background: transparent; border: none; color: var(--text); font-size: 0.8rem; outline: none; width: 0; padding: 0; transition: width 0.3s; }
        .search-wrapper.active #search-input { width: 130px; padding-left: 10px; }
        .search-results {
            position: absolute; top: 42px; right: 0; width: 220px; background: rgba(36, 16, 25, 0.95);
            backdrop-filter: blur(20px); border-radius: 14px; border: 1px solid var(--glass-brd);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5); display: none; overflow: hidden; z-index: 1200;
        }
        .search-result-item { padding: 12px 15px; font-size: 0.8rem; color: var(--text); cursor: pointer; border-bottom: 1px solid var(--glass-brd); }
        .search-result-item:hover { background: var(--accent); color: #fff; }

        /* ── Modal ── */
        .modal-content {
            border-radius: 24px; border: 1px solid rgba(255, 255, 255, 0.12);
            background: rgba(36, 16, 25, 0.94); color: #FFF1E9;
            backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
        }

        /* ── Weather FX ── */
        .rain-drop { position: absolute; background-color: rgba(255, 255, 255, 0.4); width: 2px; height: 16px; top: -20px; will-change: transform; animation: fall linear infinite; }
        @keyframes fall { to { transform: translateY(105vh); } }
        .snowflake { position: absolute; background-color: white; border-radius: 50%; top: -10px; opacity: 0.8; will-change: transform; animation: snowFall linear infinite; }
        @keyframes snowFall { 0% { transform: translateY(0) translateX(0); } 50% { transform: translateY(50vh) translateX(20px); } 100% { transform: translateY(105vh) translateX(-20px); } }
        .lightning-flash { position: absolute; inset: 0; background: white; opacity: 0; z-index: 3; }
        .flash-anim { animation: flash 3s infinite; }
        @keyframes flash { 0%,90%,100% { opacity: 0; } 92% { opacity: 0.3; } 94% { opacity: 0; } 96% { opacity: 0.5; } }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after { animation-duration: 0.001ms !important; animation-iteration-count: 1 !important; transition-duration: 0.001ms !important; }
        }
    </style>
</head>

<body>
    <div id="loader">
        <div class="weather-animation"><i class="wi wi-day-sunny sun-behind"></i><i class="wi wi-cloud cloud-icon"></i></div>
        <p class="loading-text" style="font-size: 0.7rem; letter-spacing: 3px;">CONSULTING THE SKY</p>
    </div>

    <div class="modal fade" id="hourlyModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header border-0 pb-0">
                    <h6 class="modal-title" id="modalDayLabel">Details</h6>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="modalContent">
                    <div style="height: 300px;"><canvas id="hourlyChart"></canvas></div>
                </div>
            </div>
        </div>
    </div>

    <div id="dynamic-bg"></div>
    <div id="celestial" class="celestial"></div>
    <div id="weather-overlay"></div>

    <div class="main-card">
        <div id="pull-indicator"><i class="wi wi-refresh"></i></div>

        <!-- Header -->
        <div class="wx-header">
            <div class="wx-loc">
                <svg width="15" height="18" viewBox="0 0 15 18" fill="none"><path d="M7.5 1C4 1 1.2 3.7 1.2 7.1c0 4.4 6.3 9.9 6.3 9.9s6.3-5.5 6.3-9.9C13.8 3.7 11 1 7.5 1z" stroke="currentColor" stroke-width="1.6"/><circle cx="7.5" cy="7" r="2.2" fill="currentColor"/></svg>
                <h6 id="loc-name">---</h6>
            </div>
            <div class="controls">
                <div class="search-wrapper" id="search-wrapper">
                    <button type="button" class="btn-circle" id="search-trigger" onclick="toggleSearch(event)">
                        <i class="wi wi-direction-up" style="font-size: 1.1rem; pointer-events: none;"></i>
                    </button>
                    <input type="text" id="search-input" placeholder="Search city..." autocomplete="off">
                    <div id="search-results" class="search-results"></div>
                </div>
                <div class="unit-pill">
                    <input type="radio" id="f-unit" name="unit" value="imperial" onchange="saveAndRefresh()"><label for="f-unit">°F</label>
                    <input type="radio" id="c-unit" name="unit" value="metric" onchange="saveAndRefresh()"><label for="c-unit">°C</label>
                    <span class="pill-bg"></span>
                </div>
                <button class="btn-circle" onclick="toggleTheme()"><i class="wi wi-day-sunny" id="theme-icon"></i></button>
            </div>
        </div>

        <!-- Hero -->
        <div class="wx-hero">
            <div class="wx-hero-art"><div class="wx-rays"></div><i id="main-icon" class="wi"></i></div>
            <h1 class="temp-display"><span id="temp">--</span>°</h1>
            <div id="main-forecast" class="wx-forecast">--</div>
            <div class="wx-hl">
                <span>Feels <span id="windchill">--</span>°</span>
                <span>H:<span id="hi-temp">--</span>°</span>
                <span>L:<span id="lo-temp">--</span>°</span>
            </div>
            <div id="hindsight-wrap" class="wx-hindsight" style="display:none;"><i class="wi wi-refresh"></i> <span id="hindsight-text"></span></div>
            <div id="clothing-hint" class="wx-clothing"></div>
        </div>

        <!-- Cards -->
        <div class="wx-content">
            <div id="alerts-wrap"></div>

            <!-- Hourly -->
            <div class="wx-card">
                <div class="wx-label">Hourly</div>
                <div class="wx-hourly" id="hourly-quick-view"></div>
            </div>

            <!-- Precipitation (only shown when >1% chance in the next 24h) -->
            <div class="wx-card" id="precip-card" style="display:none;">
                <div class="wx-card-head"><span class="wx-label">Precipitation</span><span class="wx-sub" id="precip-range">Next 24h</span></div>
                <div class="wx-precip" id="precip-bars"></div>
                <div class="wx-precip-cap" id="precip-caption"></div>
            </div>

            <!-- Sun -->
            <div class="wx-card">
                <div class="wx-label" style="margin-bottom:6px;">Sun</div>
                <svg width="100%" height="104" viewBox="0 0 320 104" preserveAspectRatio="none">
                    <path d="M16 92 A 144 78 0 0 1 304 92" fill="none" stroke="rgba(255,255,255,.18)" stroke-width="3" stroke-dasharray="2 7" stroke-linecap="round"/>
                    <path id="sun-progress" d="M16 92 A 144 78 0 0 1 99 22" fill="none" stroke="#FFB05C" stroke-width="3.5" stroke-linecap="round"/>
                    <circle id="sun-dot" cx="99" cy="22" r="8" fill="#FFB05C"/>
                    <circle id="sun-dot-ring" cx="99" cy="22" r="13" fill="none" stroke="rgba(255,176,92,.4)" stroke-width="2"/>
                </svg>
                <div class="wx-sun-times">
                    <div><div class="wx-sub">Sunrise</div><div class="wx-strong" id="sunrise-val">--</div></div>
                    <div style="text-align:right;"><div class="wx-sub">Sunset</div><div class="wx-strong" id="sunset-val">--</div></div>
                </div>
            </div>

            <!-- AQI + UV -->
            <div class="wx-pair">
                <div class="wx-card interactive" onclick="showAqiHourly()" style="cursor:pointer;">
                    <div class="wx-label">Air Quality</div>
                    <div class="wx-big" id="aqi-val">--</div>
                    <div class="wx-cat" id="aqi-cat">--</div>
                    <div class="wx-bar" style="background:linear-gradient(90deg,#5fc46a,#f5d24b,#f08c3a,#e0532e);"></div>
                </div>
                <div class="wx-card">
                    <div class="wx-label">UV Index</div>
                    <div class="wx-big" id="uv-val">--</div>
                    <div class="wx-cat" id="uv-cat">--</div>
                    <div class="wx-bar" style="background:linear-gradient(90deg,#5fc46a,#f5d24b,#f08c3a,#e0532e,#a23ec0);"><span class="wx-bar-dot" id="uv-dot" style="left:0%;"></span></div>
                </div>
            </div>

            <!-- Conditions (retained app metrics, in the ember card system) -->
            <div class="wx-stats">
                <div class="wx-stat interactive" onclick="showWindHourly()"><div class="wx-sub">Wind</div><div class="wx-strong"><i class="wi wi-strong-wind"></i><span id="wind">--</span></div></div>
                <div class="wx-stat interactive" onclick="showHumidityHourly()"><div class="wx-sub">Humidity</div><div class="wx-strong"><i class="wi wi-humidity"></i><span id="humidity">--</span></div></div>
                <div class="wx-stat"><div class="wx-sub">Visibility</div><div class="wx-strong"><i class="wi wi-fog"></i><span id="vis-val">--</span></div></div>
                <div class="wx-stat"><div class="wx-sub">Road</div><div class="wx-strong"><i id="safety-icon" class="wi wi-shield"></i><span id="safety-val">--</span></div></div>
                <div class="wx-stat interactive" onclick="showActivityDetails()" style="grid-column:1 / -1;"><div class="wx-sub">Activity Score</div><div class="wx-strong"><i id="score-icon" class="wi wi-direction-up"></i><span id="score-val">--</span></div></div>
            </div>

            <!-- Live Radar -->
            <div class="wx-card">
                <div class="wx-radar-head"><span class="wx-label">Live Radar</span><span class="wx-live"><span class="dot"></span>LIVE</span></div>
                <div id="radar-container"></div>
            </div>

            <!-- 7-Day -->
            <div class="wx-card">
                <div class="wx-label" style="margin-bottom:6px;">7-Day Forecast</div>
                <div id="daily-container"></div>
            </div>
        </div>

        <div class="wx-home"><div></div></div>
    </div>

    <footer class="powered-by-footer">Powered by NWS, OpenMeteo &amp; Windy · © Maruthi Phani Kumar</footer>

    <script>
        let lastData = null;
        const hourlyModal = new bootstrap.Modal(document.getElementById('hourlyModal'));

        const getChartTheme = () => {
            const isLight = document.getElementById('main-html').getAttribute('data-bs-theme') === 'light';
            return {
                gridColor: isLight ? 'rgba(0,0,0,0.05)' : 'rgba(255,255,255,0.05)',
                textColor: isLight ? '#666' : '#C99AA6',
                tooltipBg: isLight ? 'rgba(255,255,255,0.95)' : 'rgba(36,16,25,0.95)',
                tooltipText: isLight ? '#000' : '#fff'
            };
        };

        /* ── Pull to refresh ── */
        let startY = 0, pulling = false;
        const card = document.querySelector('.main-card');
        const indicator = document.getElementById('pull-indicator');

        card.addEventListener('touchstart', (e) => {
            if (window.scrollY === 0) { startY = e.touches[0].pageY; card.style.transition = 'none'; }
        }, { passive: true });
        card.addEventListener('touchmove', (e) => {
            const diff = e.touches[0].pageY - startY;
            if (diff > 0 && window.scrollY === 0) {
                pulling = true;
                const move = Math.pow(diff, 0.8);
                card.style.transform = `translateY(${move}px)`;
                indicator.style.opacity = Math.min(move / 50, 1);
                if (move >= 60 && !card.dataset.triggered) { Haptics.light(); card.dataset.triggered = "true"; indicator.style.color = "#2ecc71"; }
            }
        }, { passive: true });
        card.addEventListener('touchend', () => {
            const isTriggered = card.dataset.triggered === "true";
            card.style.transition = 'transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
            card.style.transform = 'translateY(0)';
            indicator.style.opacity = 0;
            if (isTriggered) {
                Haptics.medium();
                if (navigator.geolocation) navigator.geolocation.getCurrentPosition(p => fetchWeather(p.coords.latitude, p.coords.longitude));
            }
            delete card.dataset.triggered;
            indicator.style.color = "var(--accent)";
        });

        function toggleTheme(init = false) {
            if (!init) Haptics.medium();
            const html = document.getElementById('main-html');
            const isLight = html.getAttribute('data-bs-theme') === 'light';
            const newTheme = init ? (localStorage.getItem('theme') || 'dark') : (isLight ? 'dark' : 'light');
            html.setAttribute('data-bs-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            document.getElementById('theme-icon').className = newTheme === 'light' ? 'wi wi-night-clear' : 'wi wi-day-sunny';
        }

        const Haptics = {
            light: () => window.navigator.vibrate?.(10),
            medium: () => window.navigator.vibrate?.(25),
            success: () => window.navigator.vibrate?.([10, 30, 10]),
            warning: () => window.navigator.vibrate?.([50, 100, 50]),
            error: () => window.navigator.vibrate?.([100, 50, 100, 50])
        };

        function saveAndRefresh() {
            Haptics.light();
            localStorage.setItem('unit', document.getElementById('c-unit').checked ? 'metric' : 'imperial');
            if (lastData) updateUI(lastData);
        }

        function formatTemp(val) { return document.getElementById('c-unit').checked ? Math.round((val - 32) * 5 / 9) : Math.round(val); }

        function calculateFeelsLike(temp, humidity, windSpeed) {
            if (temp <= 50 && windSpeed > 3) return Math.round(35.74 + (0.6215 * temp) - (35.75 * Math.pow(windSpeed, 0.16)) + (0.4275 * temp * Math.pow(windSpeed, 0.16)));
            if (temp >= 80) return Math.round(0.5 * (temp + 61.0 + ((temp - 68.0) * 1.2) + (humidity * 0.094)));
            return Math.round(temp);
        }

        function calculateScoreLocally(temp, aqi, uv, wind, humid) {
            let score = 100;
            if (temp < 65) score -= (65 - temp) * 2.5;
            if (temp > 85) score -= (temp - 85) * 3.5;
            if (aqi > 50) score -= (aqi - 50) * 0.5;
            if (wind > 15) score -= (wind - 15) * 2;
            if (uv > 7) score -= (uv - 7) * 5;
            if (humid > 70) score -= (humid - 70) * 0.5;
            return Math.max(0, Math.min(100, Math.round(score)));
        }

        async function fetchWeather(lat, lon) {
            const ldr = document.querySelector('.loading-text');
            ldr.innerText = "Reading Atmosphere..";
            try {
                const nwsRes = await fetch('/weather_data', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ lat, lon }) });
                const nwsData = await nwsRes.json();
                if (!nwsRes.ok || nwsData.error) { ldr.innerText = nwsData.error || "Weather unavailable for this location."; Haptics.error(); return; }

                const realNow = new Date();
                const yesterday = new Date(); yesterday.setDate(yesterday.getDate() - 1);
                const yStr = yesterday.getFullYear() + '-' + String(yesterday.getMonth() + 1).padStart(2, '0') + '-' + String(yesterday.getDate()).padStart(2, '0');
                const pad = n => String(n).padStart(2, '0');
                const localISO = `${realNow.getFullYear()}-${pad(realNow.getMonth() + 1)}-${pad(realNow.getDate())}T${pad(realNow.getHours())}:${pad(realNow.getMinutes())}`;

                const [envRes, rainRes, precipRes, archiveRes, weatherRes] = await Promise.all([
                    fetch(`https://air-quality-api.open-meteo.com/v1/air-quality?latitude=${lat}&longitude=${lon}&current=us_aqi,uv_index&hourly=us_aqi,uv_index&timezone=auto`),
                    fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&minutely_15=precipitation&timezone=auto`),
                    fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&minutely_15=precipitation,snowfall&timezone=auto`),
                    fetch(`https://archive-api.open-meteo.com/v1/archive?latitude=${lat}&longitude=${lon}&start_date=${yStr}&end_date=${yStr}&hourly=temperature_2m&temperature_unit=fahrenheit&timezone=auto`),
                    fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=is_day&hourly=visibility,wind_gusts_10m&wind_speed_unit=mph&timezone=auto`)
                ]);

                const envData = await envRes.json();
                const rainData = await rainRes.json();
                const precipData = await precipRes.json();
                const archiveData = await archiveRes.json();
                const wData = await weatherRes.json();

                const temp = nwsData.current.temperature;
                const humid = nwsData.current.relativeHumidity?.value || 50;
                const wind = parseFloat(nwsData.current.windSpeed) || 0;
                const currentHour = realNow.getHours();

                let startIndex = precipData.minutely_15.time.findIndex(t => t >= localISO);
                if (startIndex === -1) startIndex = 0;
                const rainNow = rainData.minutely_15.precipitation.slice(startIndex, startIndex + 4);
                const snowNow = precipData.minutely_15.snowfall.slice(startIndex, startIndex + 4);
                const rain_pulse = [], snow_pulse = [];
                rainNow.forEach(val => rain_pulse.push(val, val, val));
                snowNow.forEach(val => snow_pulse.push(val, val, val));

                const mergedData = {
                    ...nwsData,
                    aqi: envData.current.us_aqi,
                    uv: envData.current.uv_index,
                    hourly_aqi: envData.hourly.us_aqi.slice(currentHour, currentHour + 24),
                    hourly_uv: envData.hourly.uv_index.slice(currentHour, currentHour + 24),
                    yesterday_temp: archiveData.hourly.temperature_2m[realNow.getHours()],
                    rain_pulse, snow_pulse,
                    feels_like: calculateFeelsLike(temp, humid, wind),
                    activity_score: calculateScoreLocally(temp, envData.current.us_aqi, envData.current.uv_index, wind, humid),
                    is_snow: nwsData.current.shortForecast.toLowerCase().includes("snow"),
                    visibility: wData.hourly.visibility[0] / 1609,
                    current_gusts: wData.hourly.wind_gusts_10m[0],
                    hourly: nwsData.hourly.map((h, i) => ({ ...h, windGusts: wData.hourly.wind_gusts_10m[i] || 0 }))
                };

                if (window.location.hostname === "localhost") console.log("Merged Data:", mergedData);
                lastData = mergedData;
                updateUI(mergedData);

                Haptics.success();
                ldr.innerText = `Hello, ${mergedData.location.split(',')[0]}`;
                setTimeout(() => { document.getElementById('loader').style.display = 'none'; }, 800);
            } catch (err) {
                console.error("Fetch Error:", err);
                ldr.innerText = "Connection Failed.";
                setTimeout(() => { document.getElementById('loader').style.display = 'none'; }, 2000);
            }
        }

        async function fetchByIP(ldr) {
            try {
                ldr.innerText = "Detecting location via IP...";
                const res = await fetch('https://ipapi.co/json/');
                const data = await res.json();
                if (data.latitude && data.longitude) fetchWeather(data.latitude, data.longitude);
                else throw new Error('No coords');
            } catch {
                ldr.innerText = "Could not detect location — use search ↗";
                setTimeout(() => { document.getElementById('loader').style.display = 'none'; }, 3000);
            }
        }

        window.onload = function () {
            const savedUnit = localStorage.getItem('unit') || 'imperial';
            document.getElementById(savedUnit === 'metric' ? 'c-unit' : 'f-unit').checked = true;
            toggleTheme(true);
            const ldr = document.querySelector('.loading-text');
            if (navigator.geolocation && window.isSecureContext) {
                ldr.innerText = "Locating you...";
                navigator.geolocation.getCurrentPosition(
                    p => fetchWeather(p.coords.latitude, p.coords.longitude),
                    () => fetchByIP(ldr),
                    { enableHighAccuracy: true, timeout: 10000, maximumAge: 60000 }
                );
            } else { fetchByIP(ldr); }
        };

        function showActivityDetails() {
            if (!lastData) return;
            const score = lastData.activity_score;
            let details = "";
            const currentWind = parseFloat(lastData.current.windSpeed) || 0;
            if (score < 50) {
                details = "Conditions are challenging. ";
                if (lastData.current.temperature > 90) details += "Extreme heat detected. ";
                if (lastData.current.temperature < 40) details += "Too Cold. ";
                if (currentWind > 20) details += "High winds may be bothersome. ";
                if (lastData.aqi > 90) details += "Air quality is poor. ";
            } else { details = "Conditions are generally favorable for being outside."; }
            document.getElementById('modalDayLabel').innerText = "Outdoor Activity Verdict";
            document.getElementById('modalContent').innerHTML = `<div class="text-center p-3"><h1 style="font-size:3rem;color:${document.getElementById('score-val').style.color}">${score}</h1><p class="mt-2">${details}</p></div>`;
            hourlyModal.show();
        }

        function getClothingAdvice(temp, precip, wind, uv) {
            if (precip > 40) return lastData.is_snow ? "Heavy Boots & Jacket ❄️" : "Rain Jacket & Umbrella ☂️";
            if (wind > 20) return "Windbreaker Needed 🌬️";
            if (temp <= 30) return "Extreme Cold: Layer Up! 🧣";
            if (temp <= 45) return "Heavy Jacket & Gloves 🧥";
            if (temp <= 55) return "Light Jacket or Hoodie 🧥";
            if (temp <= 60) return "Comfortable: Long Sleeves 👕";
            if (uv > 7) return "T-Shirt & Sunscreen 🧴";
            return "Perfect T-Shirt Weather 😎";
        }

        function aqiCategory(v) {
            if (v <= 50) return { label: "Good", bg: "rgba(95,196,106,.2)", fg: "#7fdc8a" };
            if (v <= 100) return { label: "Moderate", bg: "rgba(245,210,75,.2)", fg: "#f5d24b" };
            if (v <= 150) return { label: "Unhealthy (SG)", bg: "rgba(240,140,58,.2)", fg: "#f08c3a" };
            if (v <= 200) return { label: "Unhealthy", bg: "rgba(224,83,46,.2)", fg: "#e0532e" };
            return { label: "Hazardous", bg: "rgba(162,62,192,.2)", fg: "#c97fdc" };
        }
        function uvCategory(v) {
            if (v < 3) return { label: "Low", bg: "rgba(95,196,106,.2)", fg: "#7fdc8a" };
            if (v < 6) return { label: "Moderate", bg: "rgba(245,210,75,.2)", fg: "#f5d24b" };
            if (v < 8) return { label: "High", bg: "rgba(255,176,92,.2)", fg: "#FFB05C" };
            if (v < 11) return { label: "Very High", bg: "rgba(224,83,46,.2)", fg: "#e0532e" };
            return { label: "Extreme", bg: "rgba(162,62,192,.2)", fg: "#c97fdc" };
        }

        function renderPrecipBars(data) {
            const card = document.getElementById('precip-card');
            const wrap = document.getElementById('precip-bars');
            const cap = document.getElementById('precip-caption');
            const series = data.hourly.slice(0, 24).map(h => h.precipProb || 0);

            // Only surface the Precipitation card when there's a real chance
            // (> 1%) somewhere in the next 24 hours.
            const maxProb = series.length ? Math.max(...series) : 0;
            if (maxProb <= 1) { card.style.display = 'none'; return; }
            card.style.display = '';

            wrap.innerHTML = series.map(p => {
                let bg = 'rgba(126,192,239,.30)';
                if (p >= 60) bg = 'linear-gradient(#bfe1f4,#4f9fd8)';
                else if (p >= 30) bg = 'linear-gradient(#9fd0ef,#5fa8d8)';
                else if (p >= 10) bg = 'rgba(126,192,239,.55)';
                const h = Math.max(6, p);
                return `<div class="wx-pbar" style="height:${h}%;background:${bg};"></div>`;
            }).join('');

            const idx = series.findIndex(p => p >= 40);
            if (idx >= 0) {
                const when = new Date(data.hourly[idx].startTime).toLocaleTimeString([], { hour: 'numeric' });
                cap.innerText = `${data.is_snow ? 'Snow' : 'Light rain'} likely around ${when}`;
                cap.style.color = '#7ec0ef';
            } else {
                cap.innerText = `${data.is_snow ? 'Light snow' : 'Light rain'} possible in the next 24h`;
                cap.style.color = 'var(--muted)';
            }
        }

        function renderSunArc(data) {
            const sr = new Date(data.sun.sunrise), ss = new Date(data.sun.sunset), now = new Date();
            let t = 0.5;
            if (ss > sr) t = (now - sr) / (ss - sr);
            t = Math.max(0, Math.min(1, t));
            const x = 160 - 144 * Math.cos(Math.PI * t);
            const y = 92 - 78 * Math.sin(Math.PI * t);
            document.getElementById('sun-progress').setAttribute('d', `M16 92 A 144 78 0 0 1 ${x.toFixed(1)} ${y.toFixed(1)}`);
            document.getElementById('sun-dot').setAttribute('cx', x.toFixed(1));
            document.getElementById('sun-dot').setAttribute('cy', y.toFixed(1));
            document.getElementById('sun-dot-ring').setAttribute('cx', x.toFixed(1));
            document.getElementById('sun-dot-ring').setAttribute('cy', y.toFixed(1));
        }

        function renderAqiUv(data) {
            const aqi = Math.round(data.aqi);
            const ac = aqiCategory(aqi);
            document.getElementById('aqi-val').innerText = aqi;
            const aCat = document.getElementById('aqi-cat');
            aCat.innerText = ac.label; aCat.style.background = ac.bg; aCat.style.color = ac.fg;

            const uv = Math.round(data.uv);
            const uc = uvCategory(uv);
            document.getElementById('uv-val').innerText = uv;
            const uCat = document.getElementById('uv-cat');
            uCat.innerText = uc.label; uCat.style.background = uc.bg; uCat.style.color = uc.fg;
            document.getElementById('uv-dot').style.left = Math.min(100, (uv / 11) * 100) + '%';
        }

        function renderAlerts(data) {
            const wrap = document.getElementById('alerts-wrap');
            wrap.innerHTML = '';
            (data.alerts || []).forEach(alert => {
                const p = alert.properties;
                const extreme = (p.severity || '').toLowerCase() === 'extreme';
                const el = document.createElement('div');
                el.className = 'wx-alert' + (extreme ? ' extreme' : '');
                el.onclick = () => showAlertDetails(p.event, p.headline, p.description, p.expires);
                el.innerHTML = `
                    <div class="ic"><svg width="22" height="22" viewBox="0 0 22 22" fill="none"><path d="M11 2l9 16H2L11 2z" fill="${extreme ? '#ff4757' : '#FF5E7E'}"/><path d="M11 8v4M11 15v.5" stroke="#241019" stroke-width="1.8" stroke-linecap="round"/></svg></div>
                    <div style="flex:1;min-width:0;"><div class="ttl">${p.event}</div><div class="dsc">${p.headline || ''}</div></div>`;
                wrap.appendChild(el);
            });
        }

        function showAlertDetails(title, headline, description, expires) {
            Haptics.warning();
            const expiryDate = new Date(expires);
            const timeStr = expiryDate.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
            const dateStr = expiryDate.toLocaleDateString([], { month: 'short', day: 'numeric' });
            document.getElementById('modalDayLabel').innerText = title;
            document.getElementById('modalContent').innerHTML = `
                <div class="p-2">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <h6 style="color:#FFC2CE;" class="m-0">${headline || ''}</h6>
                        <span class="badge" style="background:rgba(255,255,255,.08);font-size:0.65rem;">Expires: ${dateStr}, ${timeStr}</span>
                    </div>
                    <p class="small" style="line-height:1.6;color:var(--muted2);">${description || ''}</p>
                </div>`;
            hourlyModal.show();
        }

        function updateUI(data) {
            const curT = formatTemp(data.current.temperature);
            const isMetric = document.getElementById('c-unit').checked;

            document.getElementById('loc-name').innerText = data.location;
            document.getElementById('main-forecast').innerText = data.current.shortForecast;
            document.getElementById('temp').innerText = curT;
            document.getElementById('windchill').innerText = formatTemp(data.feels_like);

            if (data.daily && data.daily[0]) {
                document.getElementById('hi-temp').innerText = formatTemp(data.daily[0].high);
                document.getElementById('lo-temp').innerText = formatTemp(data.daily[0].low);
            }

            const formatSunTime = (timeStr) => {
                if (!timeStr) return "--";
                const date = timeStr.includes('T') ? new Date(timeStr) : new Date('2000-01-01 ' + timeStr);
                return isNaN(date.getTime()) ? "--" : date.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
            };
            document.getElementById('sunrise-val').innerText = formatSunTime(data.sun.sunrise);
            document.getElementById('sunset-val').innerText = formatSunTime(data.sun.sunset);
            document.getElementById('humidity').innerText = (data.current.relativeHumidity?.value || 0) + '%';
            document.getElementById('wind').innerText = isMetric ? Math.round(parseFloat(data.current.windSpeed) * 1.609) + ' km/h' : data.current.windSpeed;

            if (data.yesterday_temp != null) {
                const diff = Math.round(data.current.temperature - data.yesterday_temp);
                const wrap = document.getElementById('hindsight-wrap');
                wrap.style.display = 'inline-block';
                document.getElementById('hindsight-text').innerText = Math.abs(diff) <= 1 ? `Same as yesterday` : `${Math.abs(diff)}° ${diff > 0 ? 'warmer' : 'colder'} than yesterday`;
            }

            // Dynamic blur on the floating glass (humidity + visibility, snow frosts harder)
            const humidity = data.current.relativeHumidity?.value || 50;
            const visibile = data.visibility || 10;
            const finalBlur = 4 + (humidity / 100) * 8 + Math.max(0, (10 - visibile) * 0.8);
            document.documentElement.style.setProperty('--dynamic-blur', data.is_snow ? '25px' : `${finalBlur.toFixed(1)}px`);

            document.getElementById('clothing-hint').innerText = getClothingAdvice(data.current.temperature, data.hourly[0].precipProb, parseFloat(data.current.windSpeed), data.uv);

            renderAlerts(data);
            renderAqiUv(data);
            renderPrecipBars(data);
            renderSunArc(data);

            applyWeatherEffects(data.current.shortForecast);

            // favicon emoji
            const weatherText = data.current.shortForecast.toLowerCase();
            const isDay = data.current.isDaytime !== undefined ? data.current.isDaytime : data.current.is_day;
            let emoji = isDay ? '☀️' : '🌙';
            if (weatherText.includes("rain")) emoji = '🌧️';
            if (weatherText.includes("snow")) emoji = '❄️';
            if (weatherText.includes("cloud")) emoji = '☁️';
            document.getElementById('favicon').href = `data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>${emoji}</text></svg>`;

            // Road safety
            const roadStatus = evaluateRoadSafety(data.visibility, data.current_gusts, data.current.temperature, data.hourly[0].precipProb);
            const safetyVal = document.getElementById('safety-val');
            safetyVal.innerText = roadStatus.label; safetyVal.style.color = roadStatus.color;
            document.getElementById('safety-icon').className = `wi ${roadStatus.icon}`;
            document.getElementById('safety-icon').style.color = roadStatus.color;
            document.getElementById('vis-val').innerText = data.visibility.toFixed(1) + " mi";

            // Activity score
            const score = data.activity_score;
            const valSpan = document.getElementById('score-val');
            const scoreIcon = document.getElementById('score-icon');
            let scoreColor, iconClass;
            if (score >= 85) { scoreColor = "#7fdc8a"; iconClass = "wi-horizon"; }
            else if (score >= 65) { scoreColor = "#f5d24b"; iconClass = "wi-day-cloudy"; }
            else if (score >= 40) { scoreColor = "#FFB05C"; iconClass = "wi-cloudy"; }
            else { scoreColor = "#ff4757"; iconClass = "wi-alien"; }
            valSpan.innerText = score; valSpan.style.color = scoreColor;
            scoreIcon.className = `wi ${iconClass}`; scoreIcon.style.color = scoreColor;

            // Hourly strip (weather hours + sun events)
            const now = new Date();
            const sunEvents = [
                { dateObj: new Date(data.sun.sunrise), type: 'SUNRISE', icon: 'wi-sunrise' },
                { dateObj: new Date(data.sun.sunset), type: 'SUNSET', icon: 'wi-sunset' }
            ];
            sunEvents.forEach(ev => { if (ev.dateObj < new Date(now.getTime() - 30 * 60000)) ev.dateObj.setDate(ev.dateObj.getDate() + 1); });

            let combinedItems = data.hourly.filter(h => new Date(h.startTime) >= now).slice(0, 24).map(h => ({ ...h, isWeather: true }));
            sunEvents.forEach(ev => {
                if (ev.dateObj >= now && ev.dateObj <= new Date(now.getTime() + 26 * 60 * 60 * 1000)) {
                    combinedItems.push({ startTime: ev.dateObj.toISOString(), displayTime: ev.dateObj.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' }), type: ev.type, icon: ev.icon, isSunEvent: true });
                }
            });
            combinedItems.sort((a, b) => new Date(a.startTime) - new Date(b.startTime));

            let hHtml = '', firstWeatherShown = false;
            combinedItems.forEach(item => {
                if (item.isSunEvent) {
                    hHtml += `<div class="wx-hour sun"><span class="wx-hour-t">${item.displayTime}</span><i class="wi ${item.icon} wx-hour-i"></i><span class="wx-hour-tmp" style="font-size:11px;text-transform:uppercase;">${item.type}</span></div>`;
                } else {
                    const hDate = new Date(item.startTime);
                    const hv = getVisuals(item.shortForecast, true);
                    const isNow = !firstWeatherShown; firstWeatherShown = true;
                    hHtml += `<div class="wx-hour ${isNow ? 'now' : ''}"><span class="wx-hour-t">${isNow ? 'Now' : hDate.toLocaleTimeString([], { hour: 'numeric' })}</span><i class="wi ${hv.icon} wx-hour-i"></i><span class="wx-hour-tmp">${formatTemp(item.temperature)}°</span><span class="wx-hour-p">${item.precipProb > 0 ? item.precipProb + '%' : ''}</span></div>`;
                }
            });
            document.getElementById('hourly-quick-view').innerHTML = hHtml;

            // Sky + icon + celestial
            const vis = getVisuals(data.current.shortForecast, data.current.isDaytime);
            document.getElementById('main-icon').className = `wi ${vis.icon}`;
            document.getElementById('dynamic-bg').style.background = vis.sky;
            document.getElementById('meta-theme').setAttribute('content', vis.themeColor);
            updateCelestial(data.current.isDaytime);

            // 7-day
            const weekTemps = data.daily.flatMap(d => [formatTemp(d.high), formatTemp(d.low)]);
            const minW = Math.min(...weekTemps), maxW = Math.max(...weekTemps), range = (maxW - minW) || 1;
            let dHtml = '';
            data.daily.forEach((day, i) => {
                const dv = getVisuals(day.icon, true);
                const high = formatTemp(day.high), low = formatTemp(day.low);
                const displayDay = i === 0 ? 'Today' : new Date(day.date.replace(/-/g, '\/')).toLocaleDateString('en-US', { weekday: 'short' });
                const isLastDay = i === data.daily.length - 1;
                const clickAttr = isLastDay ? '' : `onclick="showDayHourly('${day.date}', '${displayDay}')"`;
                const clickableClass = isLastDay ? '' : 'clickable';
                const leftPos = ((low - minW) / range) * 100;
                const widthBar = ((high - low) / range) * 100;
                dHtml += `<div class="wx-day-row ${clickableClass}" ${clickAttr}>
                    <div class="wx-day-lbl">${displayDay}</div>
                    <div class="wx-day-ico"><i class="wi ${dv.icon}"></i></div>
                    <div class="wx-day-lo">${low}°</div>
                    <div class="wx-day-bar"><div class="wx-day-fill" style="left:${leftPos}%;width:${widthBar}%;"></div></div>
                    <div class="wx-day-hi">${high}°</div>
                </div>`;
            });
            document.getElementById('daily-container').innerHTML = dHtml;
            document.getElementById('radar-container').innerHTML = `<iframe style="height:300px;" src="https://embed.windy.com/embed.html?type=radar&lat=${data.lat}&lon=${data.lon}&overlay=rain&product=radar&play=true"></iframe>`;
        }

        // Modal triggers
        function showAqiHourly() {
            document.getElementById('modalDayLabel').innerText = "Air Quality (24h)";
            document.getElementById('modalContent').innerHTML = '<canvas id="aqiChart"></canvas>';
            hourlyModal.show();
            setTimeout(() => createAqiChart(lastData.hourly_aqi), 300);
        }
        function showWindHourly() {
            document.getElementById('modalDayLabel').innerText = "Wind Forecast (24h)";
            document.getElementById('modalContent').innerHTML = '<canvas id="windChart"></canvas>';
            hourlyModal.show();
            setTimeout(() => createWindChart(lastData.hourly.slice(0, 24)), 300);
        }
        function showHumidityHourly() {
            document.getElementById('modalDayLabel').innerText = "Humidity (24h)";
            document.getElementById('modalContent').innerHTML = '<canvas id="humidityChart"></canvas>';
            hourlyModal.show();
            setTimeout(() => createHumidityChart(lastData.hourly.slice(0, 24)), 300);
        }
        function showDayHourly(dateStr, dayName) {
            document.getElementById('modalDayLabel').innerText = `${dayName} Hourly`;
            document.getElementById('modalContent').innerHTML = '<canvas id="hourlyChart"></canvas>';
            const filtered = lastData.hourly.filter(h => h.startTime.startsWith(dateStr));
            hourlyModal.show();
            setTimeout(() => createChart(filtered), 300);
        }

        function createAqiChart(aqiData) {
            const ctx = document.getElementById('aqiChart').getContext('2d');
            if (window.aqiChartInstance) window.aqiChartInstance.destroy();
            window.aqiChartInstance = new Chart(ctx, {
                type: 'line',
                data: { labels: aqiData.map((_, i) => `${(new Date().getHours() + i) % 24}:00`), datasets: [{ data: aqiData, borderColor: '#7fdc8a', borderWidth: 3, tension: 0.4, fill: true, pointRadius: 0, backgroundColor: (c) => { const { ctx, chartArea } = c.chart; if (!chartArea) return null; const g = ctx.createLinearGradient(0, chartArea.bottom, 0, chartArea.top); g.addColorStop(0, 'rgba(95,196,106,0)'); g.addColorStop(0.5, 'rgba(245,210,75,0.2)'); g.addColorStop(1, 'rgba(240,140,58,0.4)'); return g; } }] },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true } } }
            });
        }
        function createWindChart(hourlyData) {
            const ctx = document.getElementById('windChart').getContext('2d');
            if (window.windChartInstance) window.windChartInstance.destroy();
            const labels = hourlyData.slice(0, 24).map(h => new Date(h.startTime).getHours() + ':00');
            const speeds = hourlyData.slice(0, 24).map(h => h.windSpeed);
            const gusts = hourlyData.slice(0, 24).map(h => h.windGusts || 0);
            window.windChartInstance = new Chart(ctx, {
                type: 'line',
                data: { labels, datasets: [
                    { label: 'Sustained Wind', data: speeds, borderColor: '#FF8A5C', backgroundColor: 'rgba(255,138,92,0.12)', fill: true, tension: 0.4, pointRadius: 0 },
                    { label: 'Wind Gusts', data: gusts, borderColor: '#FF5E7E', fill: false, tension: 0.4, pointRadius: 0 }
                ] },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: true, labels: { color: '#C99AA6', usePointStyle: true } } }, scales: { y: { beginAtZero: true, grid: { color: 'rgba(255,255,255,0.05)' } }, x: { grid: { display: false } } } }
            });
        }
        function createHumidityChart(hourlyData) {
            const ctx = document.getElementById('humidityChart').getContext('2d');
            if (window.humidChartInstance) window.humidChartInstance.destroy();
            window.humidChartInstance = new Chart(ctx, {
                type: 'line',
                data: { labels: hourlyData.map(h => new Date(h.startTime).getHours() + ':00'), datasets: [{ data: hourlyData.map(h => h.humidity), borderColor: '#7ec0ef', tension: 0.4, fill: true, backgroundColor: (c) => { const { ctx, chartArea } = c.chart; if (!chartArea) return null; const g = ctx.createLinearGradient(0, chartArea.bottom, 0, chartArea.top); g.addColorStop(0, 'rgba(126,192,239,0)'); g.addColorStop(1, 'rgba(126,192,239,0.4)'); return g; } }] },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
            });
        }
        function createChart(hourlyData) {
            const ctx = document.getElementById('hourlyChart').getContext('2d');
            if (window.tempChartInstance) window.tempChartInstance.destroy();
            const temps = hourlyData.map(h => formatTemp(h.temperature));
            window.tempChartInstance = new Chart(ctx, {
                type: 'line',
                data: { labels: hourlyData.map(h => new Date(h.startTime).getHours() + ':00'), datasets: [{ data: temps, borderWidth: 4, tension: 0.4, fill: true, pointRadius: 0, pointHoverRadius: 6, borderColor: (c) => { const { ctx, chartArea, scales } = c.chart; if (!chartArea) return null; return getTemperatureGradient(ctx, chartArea, scales.y); }, backgroundColor: (c) => { const { ctx, chartArea, scales } = c.chart; if (!chartArea) return null; return getTemperatureGradient(ctx, chartArea, scales.y, true); } }] },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: false, grid: { color: 'rgba(255,255,255,0.05)' } }, x: { grid: { display: false } } } }
            });
        }
        function getTemperatureGradient(ctx, chartArea, yScale, isFill = false) {
            const gradient = ctx.createLinearGradient(0, chartArea.bottom, 0, chartArea.top);
            const addRelativeStop = (percent, color) => {
                const stop = 1 - percent;
                const alpha = isFill ? 0.4 : 1;
                gradient.addColorStop(Math.max(0, Math.min(1, stop)), color.replace('rgb', 'rgba').replace(')', `, ${alpha})`));
            };
            addRelativeStop(1.0, 'rgb(126, 192, 239)');
            addRelativeStop(0.5, 'rgb(255, 176, 92)');
            addRelativeStop(0.0, 'rgb(255, 94, 126)');
            return gradient;
        }

        // Dynamic sky: ember dark-warm gradient per condition + day/night.
        function getVisuals(text, isDay) {
            text = (text || '').toLowerCase();
            let icon = isDay ? "wi-day-sunny" : "wi-night-clear";
            let sky, themeColor;
            if (text.includes("thunder")) {
                icon = "wi-thunderstorm";
                sky = "radial-gradient(120% 70% at 70% 0%,#2e1a2a 0%,#221624 50%,#160d14 85%)"; themeColor = "#160d14";
            } else if (text.includes("rain") || (text.includes("showers") && !text.includes("snow"))) {
                icon = "wi-showers";
                sky = "radial-gradient(120% 70% at 70% 0%,#3a2433 0%,#262030 50%,#1a1019 85%)"; themeColor = "#1a1019";
            } else if (text.includes("cloud")) {
                icon = isDay ? "wi-day-cloudy" : "wi-night-alt-cloudy";
                sky = isDay ? "radial-gradient(120% 70% at 70% 0%,#5a3346 0%,#3b2330 45%,#261621 80%)" : "radial-gradient(120% 70% at 70% 0%,#3f2433 0%,#2a1a26 50%,#1c1118 85%)";
                themeColor = isDay ? "#261621" : "#1c1118";
            } else if (text.includes("snow")) {
                icon = "wi-snow";
                sky = isDay ? "radial-gradient(120% 70% at 70% 0%,#6e4456 0%,#4a2d3b 50%,#2c1a24 85%)" : "radial-gradient(120% 70% at 70% 0%,#5e3a4a 0%,#3e2734 50%,#281620 85%)";
                themeColor = isDay ? "#2c1a24" : "#281620";
            } else {
                sky = isDay ? "radial-gradient(120% 70% at 70% 0%,#7a2f44 0%,#4a1730 42%,#2a121d 78%)" : "radial-gradient(120% 70% at 70% 0%,#5a1d33 0%,#3a1226 40%,#241019 75%)";
                themeColor = isDay ? "#2a121d" : "#241019";
            }
            return { icon, sky, themeColor };
        }

        function updateCelestial(isDay) {
            const cel = document.getElementById('celestial');
            if (cel) cel.className = 'celestial ' + (isDay ? 'sun' : 'moon');
        }

        function applyWeatherEffects(condition) {
            const container = document.getElementById('weather-overlay');
            container.innerHTML = '';
            const text = (condition || '').toLowerCase();
            if (text.includes("thunder")) {
                const flash = document.createElement('div'); flash.className = 'lightning-flash flash-anim'; container.appendChild(flash);
            }
            if (text.includes("rain") || text.includes("showers") && !text.includes("snow")) {
                for (let i = 0; i < 30; i++) { const drop = document.createElement('div'); drop.className = 'rain-drop'; drop.style.left = Math.random() * 100 + '%'; drop.style.animationDuration = (Math.random() * 0.5 + 0.5) + 's'; drop.style.animationDelay = Math.random() * 2 + 's'; container.appendChild(drop); }
            }
            if (text.includes("snow")) {
                for (let i = 0; i < 40; i++) { const flake = document.createElement('div'); flake.className = 'snowflake'; const size = Math.random() * 4 + 2 + 'px'; flake.style.width = size; flake.style.height = size; flake.style.left = Math.random() * 100 + '%'; flake.style.animationDuration = (Math.random() * 3 + 2) + 's'; flake.style.animationDelay = Math.random() * 2 + 's'; container.appendChild(flake); }
            }
        }

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js').then(reg => console.log('Service Worker registered!')).catch(err => console.log('Service Worker registration failed:', err));
            });
        }

        let searchTimer;
        function toggleSearch(event) {
            if (event) event.stopPropagation();
            const wrapper = document.getElementById('search-wrapper');
            const input = document.getElementById('search-input');
            wrapper.classList.toggle('active');
            if (wrapper.classList.contains('active')) { input.focus(); Haptics.light(); }
            else document.getElementById('search-results').style.display = 'none';
        }
        document.addEventListener('click', (e) => {
            const wrapper = document.getElementById('search-wrapper');
            if (!wrapper.contains(e.target)) {
                wrapper.classList.remove('active');
                document.getElementById('search-results').style.display = 'none';
                document.getElementById('search-input').value = '';
            }
        });
        document.getElementById('search-input').addEventListener('input', (e) => {
            const query = e.target.value.trim();
            const resultsDiv = document.getElementById('search-results');
            clearTimeout(searchTimer);
            if (query.length < 2) { resultsDiv.style.display = 'none'; return; }
            searchTimer = setTimeout(async () => {
                try {
                    const response = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(query)}&count=5&language=en&format=json`);
                    const data = await response.json();
                    if (data.results && data.results.length > 0) {
                        resultsDiv.innerHTML = data.results.map(loc => `<div class="search-result-item" onclick="selectLocation(${loc.latitude}, ${loc.longitude}, '${(loc.name || '').replace(/'/g, '')}')"><div class="fw-bold">${loc.name}</div><div class="small" style="opacity:.5;">${loc.admin1 || ''}, ${loc.country_code.toUpperCase()}</div></div>`).join('');
                        resultsDiv.style.display = 'block';
                    } else { resultsDiv.style.display = 'none'; }
                } catch (err) { console.error("Search error:", err); }
            }, 300);
        });
        function selectLocation(lat, lon, name) {
            Haptics.medium();
            document.getElementById('loader').style.display = 'flex';
            document.querySelector('.loading-text').innerText = `Traveling to ${name}...`;
            fetchWeather(lat, lon);
            document.getElementById('search-results').style.display = 'none';
            document.getElementById('search-wrapper').classList.remove('active');
            document.getElementById('search-input').value = '';
        }

        function evaluateRoadSafety(vis, gusts, temp, precipProb) {
            let score = 0;
            if (vis < 0.5) score += 50; else if (vis < 2) score += 25; else if (vis < 5) score += 10;
            if (gusts > 45) score += 40; else if (gusts > 25) score += 20;
            if (temp <= 32 && precipProb > 20) score += 50; else if (temp > 105) score += 15;
            if (score >= 50) return { label: "Hazardous", color: "#ff4757", icon: "wi-thunderstorm" };
            if (score >= 20) return { label: "Caution", color: "#FFB05C", icon: "wi-cloudy-windy" };
            return { label: "Safe", color: "#7fdc8a", icon: "wi-shield" };
        }
    </script>
</body>
