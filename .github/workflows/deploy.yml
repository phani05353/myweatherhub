name: Build & Deploy

# CI/CD for WeatherHub.
#
#   merge a PR to main  ──►  build job (GitHub-hosted, amd64)
#                              builds the image and PUSHES it to GHCR
#                                          │
#                                          ▼
#                            deploy job (self-hosted runner on the homelab box)
#                              PULLS that exact image from GHCR and restarts the
#                              container (host :5090 → container :5000)
#
# This replaces the old fully-manual flow (build on the box + run deploy.sh by
# hand). The image is now built ONCE in the cloud and the box only pulls it.

on:
  push:
    branches: [main]
    # Docs-only pushes don't change the image — skip the rebuild/redeploy.
    paths-ignore:
      - '**.md'
  workflow_dispatch: {}   # allow a manual re-deploy from the Actions tab

jobs:
  build:
    name: Build & push image to GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write       # needed to push to ghcr.io
    outputs:
      image: ${{ steps.meta.outputs.image }}
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute image tags
        id: meta
        run: |
          # GHCR requires an all-lowercase path. ${VAR,,} lowercases the owner.
          REPO="${{ github.repository_owner }}/myweatherhub"
          REPO="${REPO,,}"
          SHA="${GITHUB_SHA::12}"
          {
            echo "tags=ghcr.io/${REPO}:latest,ghcr.io/${REPO}:sha-${SHA}"
            echo "image=ghcr.io/${REPO}:sha-${SHA}"   # exact tag the deploy pulls
          } >> "$GITHUB_OUTPUT"

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./dockerfile          # the Dockerfile is lowercase in this repo
          platforms: linux/amd64       # the homelab box is x86_64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to homelab
    needs: build
    runs-on: self-hosted              # the runner registered on the homelab box
    permissions:
      packages: read                  # pull the image we just pushed
    steps:
      - uses: actions/checkout@v4      # brings deploy.sh to the runner workspace

      - name: Pull image & restart container
        env:
          IMAGE: ${{ needs.build.outputs.image }}
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash deploy.sh
